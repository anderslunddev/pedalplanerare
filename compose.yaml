# Local stack: PostgreSQL (persistent volume) + app (same image as Render Dockerfile).
# Usage: copy .env.example to .env, then: docker compose up --build
# See README.md — "Local development with Docker".

name: pedalplanerare

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pedalboard
      POSTGRES_PASSWORD: pedalboard
      POSTGRES_DB: pedalboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedalboard -d pedalboard"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PUBLISH_PORT:-8080}:8080"
      - "${DEBUG_PUBLISH_PORT:-5005}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: prod,docker
      JWT_SECRET: ${JWT_SECRET:-local-docker-dev-only-secret-min-32-chars-ok}
      DATABASE_URL: postgres://pedalboard:pedalboard@postgres:5432/pedalboard
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
      RATE_LIMIT_AUTH_MAX_PER_WINDOW: ${RATE_LIMIT_AUTH_MAX_PER_WINDOW:-1000}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
