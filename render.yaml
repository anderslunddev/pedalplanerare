services:
  # PostgreSQL Database
  - type: pgsql
    name: pedalboard-db
    plan: free
    databaseName: pedalboard
    user: pedalboard_user

  # Spring Boot Web Service (Docker)
  - type: web
    name: pedalboard-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pedalboard-db
          property: connectionString
