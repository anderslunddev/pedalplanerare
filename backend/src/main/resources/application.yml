spring:
  datasource:
    # Local default: H2 in-memory. In production on Render, override via
    # SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:pedalboard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: ${SHOW_SQL:true}

app:
  jwt:
    # Use JWT_SECRET from environment (required in production)
    # Must be at least 32 characters
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-for-dev-only-1234567890}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  rate-limit:
    auth:
      max-per-window: ${RATE_LIMIT_AUTH_MAX_PER_WINDOW:10}

# bucket4j-spring-boot-starter: filter + limits via config (no custom filter/service)
bucket4j:
  enabled: true
  cache-to-use: jcache
  default-http-response-body: '{"status":429,"error":"Too Many Requests","message":"Too many attempts. Try again later."}'
  filters:
    - id: auth-rate-limit
      cache-name: auth-rate-limit
      filter-method: servlet
      url: "^(/api/users|/api/users/login)$"
      rate-limits:
        - cache-key: "@clientKeyResolver.getKey(#root)"
          execute-predicates: METHOD=POST
          bandwidths:
            - capacity: ${app.rate-limit.auth.max-per-window:10}
              time: 1
              unit: minutes
              refill-speed: greedy

server:
  # Render sets PORT environment variable automatically
  port: ${PORT:8080}

