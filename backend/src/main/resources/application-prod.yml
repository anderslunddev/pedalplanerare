# Production profile — activated via SPRING_PROFILES_ACTIVE=prod.
# Database connection is provided by entrypoint.sh which parses DATABASE_URL
# into SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD.
spring:
  h2:
    console:
      enabled: false
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
